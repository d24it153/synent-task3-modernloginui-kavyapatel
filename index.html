<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A premium, elegant glassmorphic login interface with high-fidelity animations, responsive styling, and micro-interactions.">
  <title>Synent Portal - Sign In</title>
  
  <!-- FontAwesome for Premium Modern Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-size/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Backup Icon CDNs just in case -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Theme Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient Dynamic Glow Orbs Background -->
  <div class="background-wrapper">
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>
  </div>

  <!-- Main Container -->
  <div class="container">
    <main class="card">
      
      <!-- Card Header: Branding and Greeting -->
      <header class="header-section">
        <div class="logo-wrapper">
          <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1 class="title">Welcome Back</h1>
        <p class="subtitle">Enter your credentials to access your Synent dashboard</p>
      </header>

      <!-- Interactive Form -->
      <form id="loginForm" novalidate>
        
        <!-- Email Input Group -->
        <div class="form-group">
          <div class="input-container">
            <i class="fa-regular fa-envelope input-icon"></i>
            <input 
              type="email" 
              id="email" 
              class="form-control" 
              placeholder=" " 
              required 
              autocomplete="email"
              aria-required="true"
            >
            <label for="email" class="floating-label">Email Address</label>
          </div>
        </div>

        <!-- Password Input Group -->
        <div class="form-group">
          <div class="input-container">
            <i class="fa-solid fa-lock input-icon"></i>
            <input 
              type="password" 
              id="password" 
              class="form-control" 
              placeholder=" " 
              required 
              autocomplete="current-password"
              aria-required="true"
            >
            <label for="password" class="floating-label">Password</label>
            <i class="fa-regular fa-eye-slash password-toggle" id="passwordToggle" title="Toggle password visibility" role="button" aria-label="Toggle password visibility"></i>
          </div>
        </div>

        <!-- Options: Remember Me & Forgot Password -->
        <div class="options-wrapper">
          <label class="checkbox-container">
            <input type="checkbox" id="rememberMe">
            <span class="custom-checkmark"></span>
            Remember me
          </label>
          <a href="#" class="forgot-link" id="forgotPassword">Forgot Password?</a>
        </div>

        <!-- Login Button -->
        <button type="submit" id="submitBtn" class="btn-login">
          <span class="spinner"></span>
          <span class="btn-text">Sign In</span>
        </button>

        <!-- Divider -->
        <div class="divider">or continue with</div>

        <!-- Social Logins -->
        <div class="social-grid">
          <button type="button" class="btn-social" id="btnGoogle" aria-label="Sign in with Google">
            <i class="fa-brands fa-google" style="color: #ea4335;"></i>
            Google
          </button>
          <button type="button" class="btn-social" id="btnGithub" aria-label="Sign in with GitHub">
            <i class="fa-brands fa-github"></i>
            GitHub
          </button>
        </div>

      </form>

      <!-- Signup Prompt -->
      <footer class="footer-text">
        Don't have an account? <a href="#" id="signUpLink">Create one</a>
      </footer>

    </main>
  </div>

  <!-- Container for Custom Dynamic Toasts -->
  <div class="toast-container" id="toastContainer" aria-live="polite"></div>

  <!-- Interactive JavaScript Application Controller -->
  <script src="app.js"></script>
</body>
</html>
